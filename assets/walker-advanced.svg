<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 220" width="840" height="440" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#071029"/>
      <stop offset="1" stop-color="#041022"/>
    </linearGradient>

    <linearGradient id="skin" x1="0" x2="1">
      <stop offset="0" stop-color="#FFD8B5"/>
      <stop offset="1" stop-color="#FFB07A"/>
    </linearGradient>

    <linearGradient id="shirt" x1="0" x2="1">
      <stop offset="0" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <ellipse id="shadow" cx="210" cy="180" rx="80" ry="12" fill="#000" opacity="0.18"/>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <g opacity="0.12">
    <circle cx="210" cy="110" r="60" fill="#06B6D4">
      <animate attributeName="r" values="60;72;60" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.06;0.12" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <line x1="0" y1="190" x2="420" y2="190" stroke="#0b1224" stroke-width="2" opacity="0.6"/>

  <use href="#shadow">
    <animateTransform attributeName="transform" type="scale" values="1;0.92;1" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.12;0.18" dur="0.9s" repeatCount="indefinite"/>
  </use>

  <!-- walker anchored at center; inner group handles small drift (no xlink used) -->
  <g id="walker" transform="translate(210,120)">
    <g id="walker-drift">
      <animateTransform attributeName="transform" type="translate" values="0,0;6,0;0,0" dur="3.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,0;0,0" dur="3.6s" repeatCount="indefinite" additive="sum" />
      <!-- slight body bob forward/back -->
      <animateTransform attributeName="transform" type="translate" values="0,0;2,-2;0,0" dur="0.9s" repeatCount="indefinite" additive="sum"/>

      <!-- legs group -->
      <g id="legs" transform="translate(0,28)">
        <g id="leftThigh" transform="rotate(12)">
          <rect x="-6" y="0" width="12" height="36" rx="6" fill="#1f2937">
            <animateTransform attributeName="transform" type="rotate" values="12; -18; 12" dur="0.9s" repeatCount="indefinite"/>
          </rect>
          <rect x="-6" y="34" width="12" height="28" rx="6" fill="#111827">
            <animateTransform attributeName="transform" type="rotate" values="0; 28; 0" dur="0.9s" repeatCount="indefinite" additive="sum" />
          </rect>
        </g>

        <g id="rightThigh" transform="rotate(-18)">
          <rect x="-6" y="0" width="12" height="36" rx="6" fill="#1f2937">
            <animateTransform attributeName="transform" type="rotate" values="-18; 12; -18" dur="0.9s" repeatCount="indefinite"/>
          </rect>
          <rect x="-6" y="34" width="12" height="28" rx="6" fill="#111827">
            <animateTransform attributeName="transform" type="rotate" values="0; -22; 0" dur="0.9s" repeatCount="indefinite" additive="sum" />
          </rect>
        </g>
      </g>

      <!-- torso -->
      <g id="torso" transform="translate(0,-6)">
        <rect x="-18" y="-36" width="36" height="48" rx="10" fill="url(#shirt)">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="0.9s" repeatCount="indefinite"/>
        </rect>

        <g id="leftArm" transform="translate(-20,-28)">
          <rect x="-6" y="0" width="12" height="34" rx="6" fill="#06b6d4">
            <animateTransform attributeName="transform" type="rotate" values="-18; 18; -18" dur="0.9s" repeatCount="indefinite" additive="sum"/>
          </rect>
        </g>

        <g id="rightArm" transform="translate(20,-28)">
          <rect x="-6" y="0" width="12" height="34" rx="6" fill="#7C3AED">
            <animateTransform attributeName="transform" type="rotate" values="18; -18; 18" dur="0.9s" repeatCount="indefinite" additive="sum"/>
          </rect>
        </g>

        <rect x="-6" y="-46" width="12" height="8" rx="4" fill="url(#skin)"/>

        <g id="head" transform="translate(0,-64)">
          <circle r="14" fill="url(#skin)"/>
          <circle cx="-5" cy="-2" r="1.6" fill="#0b1224"/>
          <circle cx="5" cy="-2" r="1.6" fill="#0b1224"/>
          <path d="M -6,6 Q 0,10 6,6" stroke="#0b1224" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <animateTransform attributeName="transform" type="translate" values="0,-64;0,-66;0,-64" dur="0.9s" repeatCount="indefinite"/>
        </g>
      </g>

      <!-- backpack -->
      <rect x="22" y="-30" width="10" height="18" rx="3" fill="#0ea5a4" opacity="0.95">
        <animateTransform attributeName="transform" type="translate" values="0,0;0,-1;0,0" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <text x="18" y="210" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9CA3AF">thrax • walker — animated</text>
</svg>

<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <path id="track" d="M20,60 C120,10 240,110 340,60 C420,20 520,100 580,60" fill="none" stroke="none"/>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M20,60 C120,10 240,110 340,60 C420,20 520,100 580,60"
        stroke="#0f1724" stroke-width="6" stroke-linecap="round" opacity="0.25" fill="none"/>

  <path id="stroke" d="M20,60 C120,10 240,110 340,60 C420,20 520,100 580,60"
        stroke="url(#g)" stroke-width="6" stroke-linecap="round" fill="none"
        stroke-dasharray="8 6" stroke-dashoffset="0" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="0" to="-120" dur="3s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#glow)">
    <g fill="#fff">
      <circle r="8" fill="#ffffff" opacity="1">
        <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
          <mpath href="#track"/>
        </animateMotion>
      </circle>

      <circle r="7" fill="#06B6D4" opacity="0.9">
        <animateMotion dur="3s" begin="-0.15s" repeatCount="indefinite" rotate="auto">
          <mpath href="#track"/>
        </animateMotion>
      </circle>

      <circle r="6" fill="#7C3AED" opacity="0.85">
        <animateMotion dur="3s" begin="-0.30s" repeatCount="indefinite" rotate="auto">
          <mpath href="#track"/>
        </animateMotion>
      </circle>

      <circle r="5" fill="#9CA3AF" opacity="0.7">
        <animateMotion dur="3s" begin="-0.45s" repeatCount="indefinite" rotate="auto">
          <mpath href="#track"/>
        </animateMotion>
      </circle>

      <circle r="4" fill="#ffffff" opacity="0.6">
        <animateMotion dur="3s" begin="-0.60s" repeatCount="indefinite" rotate="auto">
          <mpath href="#track"/>
        </animateMotion>
      </circle>
    </g>
  </g>

  <text x="12" y="112" font-family="Inter, Arial, sans-serif" font-size="11" fill="#94A3B8">thrax • serpent</text>
</svg>

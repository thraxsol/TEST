<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="720" height="720" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0" stop-color="#071029"/>
      <stop offset="1" stop-color="#02040a"/>
    </radialGradient>

    <radialGradient id="faceGrad" cx="30%" cy="25%" r="80%">
      <stop offset="0" stop-color="#FFF27A"/>
      <stop offset="1" stop-color="#FFB800"/>
    </radialGradient>

    <linearGradient id="tearGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#CFE9FF"/>
      <stop offset="1" stop-color="#7FC8FF"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- center group -->
  <g transform="translate(210,210)">
    <!-- subtle breathing -->
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" dur="3.6s" repeatCount="indefinite" additive="sum"/>

    <!-- shadow -->
    <ellipse cx="0" cy="150" rx="120" ry="22" fill="#000" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.08;0.12" dur="3.6s" repeatCount="indefinite"/>
    </ellipse>

    <!-- face -->
    <g filter="url(#glow)">
      <circle r="140" fill="url(#faceGrad)" stroke="#6b4f00" stroke-width="6"/>
    </g>

    <!-- eyes (squinting arcs) -->
    <g id="eyes" transform="translate(0,-20)">
      <path d="M -70,-10 C -50,-28 -10,-28 10,-10" fill="none" stroke="#0b1224" stroke-width="10" stroke-linecap="round">
        <animate attributeName="d"
                 values="M -70,-10 C -50,-28 -10,-28 10,-10; M -70,-6 C -50,-18 -10,-18 10,-6; M -70,-10 C -50,-28 -10,-28 10,-10"
                 dur="0.9s" repeatCount="indefinite"/>
      </path>
      <path d="M 70,-10 C 50,-28 10,-28 -10,-10" fill="none" stroke="#0b1224" stroke-width="10" stroke-linecap="round">
        <animate attributeName="d"
                 values="M 70,-10 C 50,-28 10,-28 -10,-10; M 70,-6 C 50,-18 10,-18 -10,-6; M 70,-10 C 50,-28 10,-28 -10,-10"
                 dur="0.9s" repeatCount="indefinite" begin="0.06s"/>
      </path>
    </g>

    <!-- mouth (open laughing) -->
    <g id="mouth" transform="translate(0,40)">
      <ellipse rx="70" ry="44" fill="#0b1224" opacity="0.95">
        <animate attributeName="ry" values="44;36;44" dur="0.9s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="50" ry="28" fill="#FF6B6B" transform="translate(0,6)">
        <animate attributeName="ry" values="28;22;28" dur="0.9s" repeatCount="indefinite"/>
      </ellipse>
      <!-- teeth line -->
      <rect x="-60" y="-6" width="120" height="8" rx="4" fill="#fff" opacity="0.95">
        <animate attributeName="y" values="-6;-2;-6" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- animated tears (left and right) -->
    <g id="tears" transform="translate(0,-10)">
      <!-- left tear -->
      <path d="M -48,10 C -44,18 -40,26 -36,36 C -34,42 -30,48 -26,54" fill="none" stroke="url(#tearGrad)" stroke-width="8" stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-width" values="8;2;8" dur="1.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,16" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" dur="2.4s" repeatCount="indefinite"/>
      </path>

      <!-- right tear -->
      <path d="M 48,10 C 44,18 40,26 36,36 C 34,42 30,48 26,54" fill="none" stroke="url(#tearGrad)" stroke-width="8" stroke-linecap="round" opacity="0.95">
        <animate attributeName="stroke-width" values="8;2;8" dur="1.8s" repeatCount="indefinite" begin="0.12s"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,8;0,16" dur="2.4s" repeatCount="indefinite" begin="0.12s"/>
        <animate attributeName="opacity" values="0.95;0.25;0.95" dur="2.4s" repeatCount="indefinite" begin="0.12s"/>
      </path>
    </g>

    <!-- caption bubble -->
    <g transform="translate(0, -170)">
      <rect x="-160" y="-18" width="320" height="44" rx="10" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="0" y="12" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#E6F7FF" text-anchor="middle" dominant-baseline="middle" opacity="0.95">
        <tspan id="caption">$LMAO</tspan>
        <animate attributeName="opacity" values="0.95;0.6;0.95" dur="3.6s" repeatCount="indefinite"/>
      </text>
      <!-- small pulse dot -->
      <circle cx="150" cy="0" r="6" fill="#7FC8FF" opacity="0.9">
        <animate attributeName="r" values="6;10;6" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- caption footer -->
  <text x="18" y="402" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9CA3AF">thrax • meme — laughing emoji</text>
</svg>

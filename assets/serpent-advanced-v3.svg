<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- BACKGROUND BASE -->
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.35" stop-color="#020617"/>
      <stop offset="0.75" stop-color="#020617"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>

    <!-- MOVING NEBULA LAYER -->
    <linearGradient id="nebula" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.12"/>
    </linearGradient>

    <!-- MOVING GLOW -->
    <radialGradient id="bgGlow" cx="20%" cy="20%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <!-- VIGNETTE -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>

    <!-- SNAKE GRADIENT -->
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F5A0"/>
      <stop offset="0.35" stop-color="#06B6D4"/>
      <stop offset="0.7" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- RIBBON HIGHLIGHT -->
    <linearGradient id="ribbonHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="0.25" stop-color="#e0f2fe" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#f9fafb" stop-opacity="0.7"/>
      <stop offset="0.75" stop-color="#e0f2fe" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>

    <!-- SNAKE PATH -->
    <path id="route" d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110" fill="none"/>

    <!-- GLOW -->
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.35
                0 0 0 0 0.93
                0 0 0 0 0.78
                0 0 0 0.9 0" result="tealGlow"/>
      <feMerge>
        <feMergeNode in="tealGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- PARTICLES -->
    <circle id="p" r="1.8" fill="#e5e7eb" opacity="0.18"/>
    <circle id="star" r="1.4" fill="#f9fafb" opacity="0.9"/>

    <!-- RIBBON MASK -->
    <mask id="ribbonMask">
      <rect width="100%" height="100%" fill="black"/>
      <path d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110"
            stroke="white" stroke-width="20" stroke-linecap="round" fill="none"
            stroke-dasharray="0 1200">
        <animate attributeName="stroke-dasharray"
                 values="0 1200;1200 0;0 1200"
                 dur="8s"
                 repeatCount="indefinite"/>
      </path>
    </mask>

    <!-- HIGHLIGHT MASK -->
    <mask id="highlightMask">
      <rect width="100%" height="100%" fill="black"/>
      <path d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110"
            stroke="white" stroke-width="10" stroke-linecap="round" fill="none"
            stroke-dasharray="120 1200">
        <animate attributeName="stroke-dashoffset"
                 from="0" to="-1320"
                 dur="4.2s"
                 repeatCount="indefinite"/>
      </path>
    </mask>
  </defs>

  <!-- MOVING BACKGROUND -->
  <g>
    <rect width="100%" height="100%" fill="url(#bg)"/>

    <!-- drifting nebula -->
    <rect width="200%" height="200%" fill="url(#nebula)" opacity="0.22">
      <animateTransform attributeName="transform"
                        type="translate"
                        from="0 0" to="-300 -120"
                        dur="28s"
                        repeatCount="indefinite"/>
    </rect>

    <!-- drifting glow -->
    <rect width="200%" height="200%" fill="url(#bgGlow)" opacity="0.9">
      <animateTransform attributeName="transform"
                        type="translate"
                        from="0 0" to="-200 -80"
                        dur="32s"
                        repeatCount="indefinite"/>
    </rect>

    <rect width="100%" height="100%" fill="url(#vignette)"/>
  </g>

  <!-- STARFIELD -->
  <g>
    <use href="#p" x="60" y="30"><animateMotion dur="14s" repeatCount="indefinite" path="M0,0 L840,0"/></use>
    <use href="#p" x="120" y="180"><animateMotion dur="18s" repeatCount="indefinite" path="M0,0 L840,0"/></use>
    <use href="#p" x="300" y="50"><animateMotion dur="12s" repeatCount="indefinite" path="M0,0 L840,0"/></use>
    <use href="#p" x="420" y="170"><animateMotion dur="16s" repeatCount="indefinite" path="M0,0 L840,0"/></use>
    <use href="#p" x="700" y="40"><animateMotion dur="20s" repeatCount="indefinite" path="M0,0 L840,0"/></use>

    <use href="#star" x="180" y="60"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.4s" repeatCount="indefinite"/></use>
    <use href="#star" x="520" y="40"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4.1s" repeatCount="indefinite"/></use>
    <use href="#star" x="780" y="150"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.8s" repeatCount="indefinite"/></use>
  </g>

  <!-- GUIDE PATH -->
  <path d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110"
        stroke="#020617" stroke-width="5" stroke-linecap="round" opacity="0.35" fill="none"/>

  <!-- RIBBON -->
  <g mask="url(#ribbonMask)" opacity="0.95">
    <rect width="100%" height="100%" fill="url(#grad)" opacity="0.22"/>
    <rect width="100%" height="100%" fill="url(#ribbonHighlight)" opacity="0.55"/>
  </g>

  <!-- MOVING TEXTURE -->
  <path d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110"
        stroke="url(#grad)" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="14 10" fill="none" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="0" to="-260" dur="3.6s" repeatCount="indefinite"/>
  </path>

  <!-- HIGHLIGHT STREAK -->
  <g mask="url(#highlightMask)" opacity="0.9">
    <path d="M40,110 C140,20 260,200 380,110 C480,40 600,200 740,110 C820,60 860,140 900,110"
          stroke="#e0f2fe" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- SNAKE -->
  <g filter="url(#softGlow)">
    <circle r="10.5" fill="#f9fafb"><animateMotion dur="3.6s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="9.5" fill="url(#grad)" opacity="0.98"><animateMotion dur="3.6s" begin="-0.18s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="8.5" fill="#06B6D4" opacity="0.92"><animateMotion dur="3.6s" begin="-0.36s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="7.5" fill="#22c55e" opacity="0.88"><animateMotion dur="3.6s" begin="-0.54s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="6.5" fill="#7C3AED" opacity="0.8"><animateMotion dur="3.6s" begin="-0.72s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="5.5" fill="#00F5A0" opacity="0.7"><animateMotion dur="3.6s" begin="-0.9s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
    <circle r="4.5" fill="#f9fafb" opacity="0.55"><animateMotion dur="3.6s" begin="-1.08s" repeatCount="indefinite" rotate="auto"><mpath href="#route"/></animateMotion></circle>
  </g>

  <!-- LABEL -->
  <text x="22" y="198"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif"
        font-size="12"
        letter-spacing="0.12em"
        fill="#9CA3AF"
        opacity="0.9">
    thrax • serpent — advanced
  </text>
</svg>

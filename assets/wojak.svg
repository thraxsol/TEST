<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" width="720" height="720" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#071029"/>
      <stop offset="1" stop-color="#041022"/>
    </linearGradient>

    <linearGradient id="skin" x1="0" x2="1">
      <stop offset="0" stop-color="#FFF6E6"/>
      <stop offset="1" stop-color="#FFE8C8"/>
    </linearGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- center group for animation -->
  <g id="scene" transform="translate(210,210)">
    <!-- subtle breathing scale -->
    <animateTransform attributeName="transform" type="scale"
      values="1 1;1.01 0.995;1 1" dur="3.6s" repeatCount="indefinite" additive="sum"/>

    <!-- shadow -->
    <ellipse cx="0" cy="170" rx="110" ry="22" fill="#000" opacity="0.12">
      <animate attributeName="opacity" values="0.12;0.08;0.12" dur="3.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="1;0.96;1" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>

    <!-- head group (bobs slightly) -->
    <g id="head" transform="translate(0,-40)">
      <animateTransform attributeName="transform" type="translate" values="0,-40;0,-42;0,-40" dur="0.9s" repeatCount="indefinite" additive="sum"/>

      <!-- face fill -->
      <path d="M -120,-10 C -120,-120 -20,-180 0,-180 C 20,-180 120,-120 120,-10 C 120,80 60,150 0,170 C -60,150 -120,80 -120,-10 Z"
            fill="url(#skin)" stroke="none"/>

      <!-- outline (Wojak style thick line) -->
      <path d="M -120,-10 C -120,-120 -20,-180 0,-180 C 20,-180 120,-120 120,-10 C 120,80 60,150 0,170 C -60,150 -120,80 -120,-10 Z"
            fill="none" stroke="#0b1224" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

      <!-- forehead wrinkle -->
      <path d="M -40,-120 C -20,-130 20,-130 40,-120" fill="none" stroke="#0b1224" stroke-width="2.2" stroke-linecap="round"/>

      <!-- left eye socket and eye -->
      <g transform="translate(-30,-60)">
        <path d="M -18,0 C -12,-10 12,-10 18,0" fill="none" stroke="#0b1224" stroke-width="3" stroke-linecap="round"/>
        <circle cx="0" cy="6" r="3.2" fill="#0b1224">
          <animate attributeName="r" values="3.2;0.8;3.2" dur="3.6s" repeatCount="indefinite"/>
        </circle>
      </g>

      <!-- right eye socket and eye -->
      <g transform="translate(30,-60)">
        <path d="M -18,0 C -12,-10 12,-10 18,0" fill="none" stroke="#0b1224" stroke-width="3" stroke-linecap="round"/>
        <circle cx="0" cy="6" r="3.2" fill="#0b1224">
          <animate attributeName="r" values="3.2;0.8;3.2" dur="3.6s" repeatCount="indefinite" begin="0.18s"/>
        </circle>
      </g>

      <!-- nose -->
      <path d="M 0,-30 C 6,-18 6,-6 0,-2" fill="none" stroke="#0b1224" stroke-width="2.4" stroke-linecap="round"/>

      <!-- mouth (subtle sad curve) -->
      <path d="M -28,18 Q 0,30 28,18" fill="none" stroke="#0b1224" stroke-width="3" stroke-linecap="round">
        <animate attributeName="d"
                 values="M -28,18 Q 0,30 28,18; M -28,16 Q 0,26 28,16; M -28,18 Q 0,30 28,18"
                 dur="1.8s" repeatCount="indefinite"/>
      </path>

      <!-- cheek lines -->
      <path d="M -70,10 C -58,18 -46,22 -34,20" fill="none" stroke="#0b1224" stroke-width="1.6" opacity="0.9"/>
      <path d="M 70,10 C 58,18 46,22 34,20" fill="none" stroke="#0b1224" stroke-width="1.6" opacity="0.9"/>

      <!-- jaw crease -->
      <path d="M -40,60 C -20,80 20,80 40,60" fill="none" stroke="#0b1224" stroke-width="2" stroke-linecap="round"/>

      <!-- subtle tear (optional, low opacity) -->
      <path id="tear" d="M 36,-30 C 38,-22 34,-14 34,-6 C 34,2 30,8 28,12 C 26,16 24,18 22,20"
            fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" opacity="0.0">
        <animate attributeName="opacity" values="0;0.9;0" dur="6s" repeatCount="indefinite" begin="1s"/>
        <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,12" dur="6s" repeatCount="indefinite" begin="1s"/>
      </path>
    </g>

    <!-- neck and shoulders -->
    <g transform="translate(0,40)">
      <rect x="-48" y="0" width="96" height="36" rx="18" fill="#111827" opacity="0.95"/>
      <rect x="-36" y="-6" width="72" height="18" rx="9" fill="url(#skin)" opacity="0.95"/>
    </g>
  </g>

  <!-- small caption -->
  <text x="18" y="402" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9CA3AF">thrax • wojak — subtle</text>
</svg>
